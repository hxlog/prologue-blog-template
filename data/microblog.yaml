- date: 2025-03-05
  content: 我活得太过安逸，以至于活在和平年间都感到恶心，甚至想破坏这种死水一般的秩序。
- date: 2025-06-24
  content: 最讨厌有人问我为什么喜欢评判社会却不去考公改变现状。首先，如果站在既得利益者的角度，任何批判的言论因其立场和利益关系就会丧失原有的动机和合理性，所有的批评都显得乏力。其次，是不想混在精致的利己主义者圈子内，玷污人的道德和尊严。很多人获得了权力，却抛弃了道德和常识，成为权力机构里死板地按规章制度行事的螺丝钉。最后，是它不值得被改善，而且不是所有人都有如此崇高的家国情怀。我相信在技术官僚系统下是不会有任何实质性改善，任何细小改变的举措都会被“回归”标准化，一种去人格化的社会工程建设，被层层KPI和形式主义奴役的政府只会是后极权主义的零部件，夺走了这片土地和人民原有的活力和潜力。如今仍然是一个被允许牺牲大部分利益的秩序，荒谬又合理。
- date: 2025-06-24
  content: 活在现代社会，意味着生活是由商品物质基础、工作伦理、精神消费主义构成，大部分人穷极一生，追求的无非是房车、（可能是非自愿的）组建家庭。可怜的人民被国家资本主义和世俗价值观操纵，一会抱怨不明确的境外势力，一会抱怨政府和（红色）资本家，他们抱怨这么多，其实抱怨的终点是他们自己：自己为国企私企等制度既得利益者卖命被收割剩余价值，接受了民族主义的宣传，主动缴纳了原可避免的纳税项目。如果他们口中抱怨的任何事物是有错的，那么和自己脱不了关系，他们自己就沦为系统的一部分，同时也无法想象过另一种生活的可能，逐渐失去反抗的动机。毕竟这是为了生存啊，是无可奈何的，只能行尸走肉般活着，一天工作下来所剩无几的空闲时间，他们在刷短视频这一媒介景观，重塑人的感知偏好、社交网络和消费观念，人们开始忽视传统商品的内在价值，认可符号价值和差异化审美。我认为当下人们的敌人是他们自己的欲望，这应该推崇节欲、延迟满足还是道德选择呢，似乎都不太合适，而是应该活在真实中，消解宏大叙事和他者的欲望。我想，什么时候人们才能获得精神自由，这一天也许是临死前吧，这时任何努力都没有意义，祈求着死神早日结束掉这一场噩梦。
- date: 2025-06-24
  content: 其实很多人组建家庭反而是搭建了一所监狱，长大后拥有了经济自由，却用各种物质基础建立新的围墙，美化父母的身份，把自己未完成的事强加给孩子。如果我以后有孩子，我一定会贯彻虚无主义的设定，不会要求他去做任何事物，也不需要成为一个所谓优秀的人，光是健康地活着已经是一种伟大。我们在反抗原生家庭的路上越走越远，如果是为了字面意义的生存，和祖先一样，一而再，再而三的延续家庭冷暴力和绩优主义，家庭只是一个看似和谐的牢笼。一个人如果被无知的原生家庭伤害，又用同样的教育方法应用到下一代，这样的人又和人渣有什么区别。
- date: 2025-06-24
  content: 人生告一段落，大学毕业后的日子真是一日不如一日，主要是不自由的地活着。从活在别人的目光里，到拼命向别人去证明我的想法。尽管回头看做过很多错事，但是不做出改变和行动，就一定没有未来，那么只好选择一条最不留遗憾的路，主动选择并承担对应的责任和后果，这是我认为的自由。